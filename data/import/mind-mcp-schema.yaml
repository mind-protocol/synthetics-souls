output:
  
  current_prediction:
    timestamp: null
    predicted_behavior:
      category: null  # "approach_food" | "avoid_threat" | "seek_rest" | etc.
      specific_action: null
      confidence: 0.0
    contributing_factors: []  # Liste des variables qui ont le plus influencé
  
  observed_behavior:
    timestamp: null
    behavior:
      category: null
      specific_action: null
      detection_method: null  # "video_analysis" | "self_report" | "sensor"
      certainty: 0.0
  
  comparison:
    prediction_matches_observation: null
